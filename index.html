<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Todo Card - Stage 1</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>

<article data-testid="test-todo-card" class="card">

    <!-- HEADER: Title & Priority -->
    <div class="card-header">
        <h2 data-testid="test-todo-title" id="title">
            Finish HNG Stage 1 Task
        </h2>
        <span data-testid="test-todo-priority" class="priority-badge high" aria-label="Priority: High">
            High
        </span>
    </div>

    <!-- DESCRIPTION SECTION WITH EXPAND/COLLAPSE -->
    <div class="description-section">
        <p data-testid="test-todo-description" id="description" class="description-text">
            Build a fully interactive todo card with edit, status, and time logic. Extend the Stage 0 card with editing capabilities, status transitions, priority changes, and dynamic time handling.
        </p>
        <button 
            data-testid="test-todo-expand-toggle" 
            id="expandBtn" 
            class="expand-btn"
            aria-expanded="false"
            aria-controls="collapsible-section"
            aria-label="Expand or collapse description"
        >
            Expand
        </button>
    </div>

    <!-- COLLAPSIBLE SECTION: Status & Time -->
    <section 
        data-testid="test-todo-collapsible-section" 
        id="collapsible-section" 
        class="collapsible-section" 
        hidden
    >
        <!-- STATUS CONTROL -->
        <div class="control-group">
            <label for="statusControl">Status:</label>
            <select 
                data-testid="test-todo-status-control" 
                id="statusControl" 
                aria-label="Task status"
            >
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
        </div>

        <!-- DUE DATE -->
        <div class="control-group">
            <time 
                data-testid="test-todo-due-date" 
                id="dueDate" 
                datetime="2026-04-25T18:00:00"
            >
                Due April 25, 2026
            </time>
        </div>

        <!-- TIME REMAINING -->
        <div 
            data-testid="test-todo-time-remaining" 
            id="timeRemaining" 
            class="time-remaining"
            aria-live="polite"
            aria-label="Time remaining"
        >
            Loading...
        </div>

        <!-- OVERDUE INDICATOR -->
        <div 
            data-testid="test-todo-overdue-indicator" 
            id="overdueIndicator" 
            class="overdue-indicator hidden"
            role="alert"
        >
            ⚠ Overdue
        </div>
    </section>

    <!-- CHECKBOX TOGGLE -->
    <div class="checkbox-group">
        <input 
            type="checkbox" 
            id="completeToggle" 
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
        />
        <label for="completeToggle">Mark as complete</label>
    </div>

    <!-- EDIT MODE FORM -->
    <div 
        data-testid="test-todo-edit-form" 
        id="editForm" 
        class="edit-form hidden"
        role="dialog"
        aria-labelledby="editFormTitle"
    >
        <h3 id="editFormTitle" class="edit-form-title">Edit Task</h3>

        <div class="form-group">
            <label for="editTitle">Title <span class="required">*</span></label>
            <input 
                type="text" 
                id="editTitle" 
                data-testid="test-todo-edit-title-input"
                required
                maxlength="100"
            />
        </div>

        <div class="form-group">
            <label for="editDescription">Description</label>
            <textarea 
                id="editDescription" 
                data-testid="test-todo-edit-description-input"
                rows="4"
                maxlength="500"
            ></textarea>
        </div>

        <div class="form-group">
            <label for="editPriority">Priority</label>
            <select 
                id="editPriority" 
                data-testid="test-todo-edit-priority-select"
            >
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label for="editDueDate">Due Date</label>
            <input 
                type="datetime-local" 
                id="editDueDate" 
                data-testid="test-todo-edit-due-date-input"
            />
        </div>

        <div class="form-actions">
            <button 
                type="button"
                data-testid="test-todo-save-button" 
                id="saveBtn" 
                class="btn-primary"
            >
                Save
            </button>
            <button 
                type="button"
                data-testid="test-todo-cancel-button" 
                id="cancelBtn" 
                class="btn-secondary"
            >
                Cancel
            </button>
        </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="actions">
        <button 
            data-testid="test-todo-edit-button" 
            id="editBtn" 
            class="btn-secondary"
            aria-label="Edit task"
        >
            Edit
        </button>

        <button 
            data-testid="test-todo-delete-button" 
            id="deleteBtn" 
            class="btn-danger"
            aria-label="Delete task"
        >
            Delete
        </button>
    </div>

</article>

<script src="card.js"></script>

</body>
